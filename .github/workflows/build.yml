name: Build Veriify

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download Kokoro models
        run: |
          mkdir -p backend/models
          wget -q https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin -O backend/models/voices-v1.0.bin
          wget -q https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx -O backend/models/kokoro-v1.0.onnx

      - name: Build Python backend
        run: |
          cd backend
          pyinstaller --onefile --name app \
            --add-data "static:static" \
            --add-data "prompts:prompts" \
            --add-data "utils:utils" \
            --add-data "models:models" \
            --collect-all kokoro_onnx \
            --collect-data language_tags \
            app.py

      - name: Install Node dependencies
        run: npm install

      - name: Build Mac DMG
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: Veriify-mac
          path: dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download Kokoro models
        shell: bash
        run: |
          mkdir -p backend/models
          curl -L -o backend/models/voices-v1.0.bin https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin
          curl -L -o backend/models/kokoro-v1.0.onnx https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx

      - name: Build Python backend
        run: |
          cd backend
          pyinstaller --onefile --name app.exe `
            --add-data "static;static" `
            --add-data "prompts;prompts" `
            --add-data "utils;utils" `
            --add-data "models;models" `
            --collect-all kokoro_onnx `
            --collect-data language_tags `
            app.py

      - name: Install Node dependencies
        run: npm install

      - name: Build Windows installer
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Veriify-windows
          path: dist/*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: Veriify-mac
          path: ./artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Veriify-windows
          path: ./artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-beta
          files: ./artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: false
